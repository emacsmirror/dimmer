name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version:
          - 27.2
          - 28.2
          - 29.4
          - 30.2
          - snapshot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs-version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install Eask
        run: |
          curl -fsSL https://raw.githubusercontent.com/emacs-eask/cli/master/webinstall/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Eask packages
        uses: actions/cache@v4
        with:
          path: .eask
          key: eask-${{ matrix.emacs-version }}-${{ hashFiles('Eask') }}
          restore-keys: |
            eask-${{ matrix.emacs-version }}-

      - name: Install development dependencies
        run: eask install-deps --dev

      - name: Lint checkdoc
        run: eask lint checkdoc

      - name: Lint package
        run: eask lint package

      - name: Lint declare
        run: eask lint declare

      - name: Lint indent
        run: eask lint indent

      - name: Lint elisp-lint
        run: eask lint elisp-lint

      - name: Byte-compile
        run: eask compile
